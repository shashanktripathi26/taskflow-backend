<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow — Team Task Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f11;
    --bg2: #18181c;
    --bg3: #222228;
    --bg4: #2a2a32;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f0eff4;
    --text2: #9896a8;
    --text3: #5e5c6e;
    --accent: #7c6fff;
    --accent2: #a89fff;
    --accent-dim: rgba(124,111,255,0.15);
    --green: #3ecf8e;
    --green-dim: rgba(62,207,142,0.15);
    --amber: #f5a623;
    --amber-dim: rgba(245,166,35,0.12);
    --red: #ff5f5f;
    --red-dim: rgba(255,95,95,0.12);
    --blue: #5bb6ff;
    --blue-dim: rgba(91,182,255,0.12);
    --radius: 10px;
    --radius-lg: 14px;
    --shadow: 0 4px 24px rgba(0,0,0,0.4);
  }

  html, body { height: 100%; font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; }

  /* AUTH */
  #auth-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(ellipse at 30% 20%, rgba(124,111,255,0.12) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 80%, rgba(62,207,142,0.07) 0%, transparent 60%),
                var(--bg);
  }

  .auth-card {
    width: 400px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 40px;
    box-shadow: var(--shadow);
  }

  .auth-logo { display: flex; align-items: center; gap: 10px; margin-bottom: 32px; }
  .auth-logo .dot { width: 28px; height: 28px; background: var(--accent); border-radius: 8px; }
  .auth-logo span { font-size: 20px; font-weight: 600; letter-spacing: -0.5px; }

  .auth-tabs { display: flex; gap: 4px; background: var(--bg3); border-radius: var(--radius); padding: 4px; margin-bottom: 28px; }
  .auth-tab { flex: 1; padding: 8px; text-align: center; border-radius: 7px; cursor: pointer; font-size: 13px; font-weight: 500; color: var(--text2); transition: all 0.2s; border: none; background: none; }
  .auth-tab.active { background: var(--bg4); color: var(--text); }

  .form-group { margin-bottom: 16px; }
  label { display: block; font-size: 12px; font-weight: 500; color: var(--text2); margin-bottom: 6px; letter-spacing: 0.3px; }
  input[type="text"], input[type="email"], input[type="password"], select, textarea {
    width: 100%; background: var(--bg3); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 10px 14px; color: var(--text); font-family: inherit;
    font-size: 14px; outline: none; transition: border 0.2s;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--accent); }
  select { cursor: pointer; }
  textarea { resize: vertical; min-height: 80px; }

  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 7px; padding: 10px 18px; border-radius: var(--radius); font-family: inherit; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s; border: none; }
  .btn-primary { background: var(--accent); color: #fff; width: 100%; }
  .btn-primary:hover { background: #8f81ff; transform: translateY(-1px); }
  .btn-secondary { background: var(--bg3); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { background: var(--bg4); }
  .btn-ghost { background: transparent; color: var(--text2); border: 1px solid var(--border); }
  .btn-ghost:hover { background: var(--bg3); color: var(--text); }
  .btn-danger { background: var(--red-dim); color: var(--red); border: 1px solid rgba(255,95,95,0.2); }
  .btn-danger:hover { background: rgba(255,95,95,0.25); }
  .btn-sm { padding: 6px 12px; font-size: 12px; }
  .btn-icon { padding: 7px; border-radius: 8px; }

  .role-tag { display: inline-flex; align-items: center; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 500; }
  .role-admin { background: var(--accent-dim); color: var(--accent2); }
  .role-member { background: var(--bg3); color: var(--text2); }

  /* APP LAYOUT */
  #app { display: none; height: 100vh; flex-direction: row; }
  #app.visible { display: flex; }

  /* SIDEBAR */
  .sidebar {
    width: 230px; min-width: 230px; background: var(--bg2); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; padding: 20px 0;
  }
  .sidebar-logo { display: flex; align-items: center; gap: 9px; padding: 0 20px 20px; border-bottom: 1px solid var(--border); margin-bottom: 16px; }
  .sidebar-logo .dot { width: 22px; height: 22px; background: var(--accent); border-radius: 6px; flex-shrink: 0; }
  .sidebar-logo span { font-size: 15px; font-weight: 600; letter-spacing: -0.3px; }

  .sidebar-section { padding: 0 12px; margin-bottom: 6px; }
  .sidebar-label { font-size: 10px; font-weight: 600; color: var(--text3); letter-spacing: 0.8px; text-transform: uppercase; padding: 0 8px 8px; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: var(--radius); cursor: pointer; color: var(--text2); font-size: 13px; font-weight: 400; transition: all 0.15s; margin-bottom: 2px; }
  .nav-item:hover { background: var(--bg3); color: var(--text); }
  .nav-item.active { background: var(--accent-dim); color: var(--accent2); font-weight: 500; }
  .nav-item .icon { font-size: 15px; width: 18px; text-align: center; }
  .nav-badge { margin-left: auto; background: var(--red); color: #fff; font-size: 10px; font-weight: 600; padding: 2px 6px; border-radius: 10px; min-width: 18px; text-align: center; }

  .sidebar-footer { margin-top: auto; padding: 16px 12px 0; border-top: 1px solid var(--border); }
  .user-chip { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: var(--radius); }
  .avatar { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; flex-shrink: 0; }

  /* MAIN */
  .main { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
  .topbar { display: flex; align-items: center; padding: 16px 28px; border-bottom: 1px solid var(--border); gap: 16px; background: var(--bg); position: sticky; top: 0; z-index: 10; }
  .topbar-title { font-size: 16px; font-weight: 600; }
  .topbar-actions { margin-left: auto; display: flex; gap: 8px; }
  .page { padding: 28px; flex: 1; }

  /* DASHBOARD */
  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px; }
  .stat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; }
  .stat-label { font-size: 12px; color: var(--text2); margin-bottom: 8px; }
  .stat-value { font-size: 28px; font-weight: 600; letter-spacing: -1px; }
  .stat-sub { font-size: 12px; color: var(--text3); margin-top: 4px; }

  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .section-title { font-size: 15px; font-weight: 600; }

  /* PROJECTS */
  .projects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
  .project-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; cursor: pointer; transition: all 0.2s; }
  .project-card:hover { border-color: var(--border2); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
  .project-name { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
  .project-desc { font-size: 13px; color: var(--text2); margin-bottom: 16px; line-height: 1.5; }
  .project-meta { display: flex; align-items: center; justify-content: space-between; }
  .progress-wrap { margin-top: 14px; }
  .progress-label { display: flex; justify-content: space-between; font-size: 11px; color: var(--text2); margin-bottom: 6px; }
  .progress-bar { height: 4px; background: var(--bg4); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 2px; background: var(--accent); transition: width 0.5s; }

  /* TASKS */
  .task-filters { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
  .filter-chip { padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 500; cursor: pointer; border: 1px solid var(--border); background: var(--bg2); color: var(--text2); transition: all 0.15s; }
  .filter-chip.active { background: var(--accent-dim); border-color: rgba(124,111,255,0.3); color: var(--accent2); }

  .tasks-list { display: flex; flex-direction: column; gap: 8px; }
  .task-row { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; display: flex; align-items: center; gap: 14px; transition: all 0.15s; }
  .task-row:hover { border-color: var(--border2); }
  .task-check { width: 18px; height: 18px; border: 2px solid var(--border2); border-radius: 5px; flex-shrink: 0; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .task-check.done { background: var(--green); border-color: var(--green); }
  .task-check.done::after { content: '✓'; color: #0f0f11; font-size: 11px; font-weight: 700; }
  .task-title { flex: 1; font-size: 14px; }
  .task-title.done { text-decoration: line-through; color: var(--text2); }
  .task-info { display: flex; align-items: center; gap: 10px; }

  .badge { display: inline-flex; align-items: center; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 500; }
  .badge-todo { background: var(--bg3); color: var(--text2); }
  .badge-progress { background: var(--blue-dim); color: var(--blue); }
  .badge-done { background: var(--green-dim); color: var(--green); }
  .badge-overdue { background: var(--red-dim); color: var(--red); }
  .badge-high { background: var(--red-dim); color: var(--red); }
  .badge-medium { background: var(--amber-dim); color: var(--amber); }
  .badge-low { background: var(--bg3); color: var(--text2); }

  /* MEMBERS */
  .members-list { display: flex; flex-direction: column; gap: 10px; }
  .member-row { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 18px; display: flex; align-items: center; gap: 14px; }
  .member-info { flex: 1; }
  .member-name { font-size: 14px; font-weight: 500; }
  .member-email { font-size: 12px; color: var(--text2); margin-top: 2px; }

  /* MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
  .modal { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 28px; width: 100%; max-width: 480px; box-shadow: var(--shadow); max-height: 90vh; overflow-y: auto; }
  .modal-title { font-size: 16px; font-weight: 600; margin-bottom: 24px; }
  .modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; }

  /* MISC */
  .empty { text-align: center; padding: 60px 20px; color: var(--text2); }
  .empty-icon { font-size: 36px; margin-bottom: 12px; }
  .empty-text { font-size: 14px; }

  .avatar-colors { --c0:#7c6fff;--c1:#3ecf8e;--c2:#f5a623;--c3:#ff5f5f;--c4:#5bb6ff; }

  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .overdue-warning { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; color: var(--red); }

  .notification { position: fixed; bottom: 24px; right: 24px; background: var(--bg3); border: 1px solid var(--border2); border-radius: var(--radius); padding: 12px 18px; font-size: 13px; box-shadow: var(--shadow); z-index: 200; transform: translateY(80px); opacity: 0; transition: all 0.3s; }
  .notification.show { transform: translateY(0); opacity: 1; }

  .task-actions { display: flex; gap: 6px; opacity: 0; transition: opacity 0.15s; }
  .task-row:hover .task-actions { opacity: 1; }

  .project-selector { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
  .proj-chip { padding: 7px 14px; border-radius: 20px; font-size: 12px; font-weight: 500; cursor: pointer; border: 1px solid var(--border); background: var(--bg2); color: var(--text2); transition: all 0.15s; }
  .proj-chip.active { background: var(--accent-dim); border-color: rgba(124,111,255,0.3); color: var(--accent2); }

  .dash-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .dash-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; }
  .dash-card-title { font-size: 13px; font-weight: 500; color: var(--text2); margin-bottom: 14px; }
  .mini-task { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .mini-task:last-child { border-bottom: none; }
</style>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="dot"></div>
      <span>TaskFlow</span>
    </div>
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Sign in</button>
      <button class="auth-tab" id="tab-signup" onclick="switchTab('signup')">Create account</button>
    </div>

    <div id="login-form">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="you@example.com" value="admin@taskflow.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="••••••••" value="password">
      </div>
      <button class="btn btn-primary" onclick="login()" style="margin-top:4px">Sign in</button>
      <p style="text-align:center;margin-top:16px;font-size:12px;color:var(--text2)">
        Demo: admin@taskflow.com / password<br>or member@taskflow.com / password
      </p>
    </div>

    <div id="signup-form" style="display:none">
      <div class="form-group">
        <label>Full name</label>
        <input type="text" id="signup-name" placeholder="Jane Smith">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="signup-email" placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="signup-password" placeholder="At least 8 characters">
      </div>
      <div class="form-group">
        <label>Role</label>
        <select id="signup-role">
          <option value="member">Member</option>
          <option value="admin">Admin</option>
        </select>
      </div>
      <button class="btn btn-primary" onclick="signup()" style="margin-top:4px">Create account</button>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="sidebar">
    <div class="sidebar-logo">
      <div class="dot"></div>
      <span>TaskFlow</span>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">Navigation</div>
      <div class="nav-item active" onclick="navigate('dashboard')">
        <span class="icon">◈</span> Dashboard
      </div>
      <div class="nav-item" onclick="navigate('projects')">
        <span class="icon">⬡</span> Projects
      </div>
      <div class="nav-item" onclick="navigate('tasks')">
        <span class="icon">◉</span> Tasks
        <span class="nav-badge" id="overdue-badge" style="display:none">0</span>
      </div>
      <div class="nav-item" id="nav-members" onclick="navigate('members')" style="display:none">
        <span class="icon">⊞</span> Members
      </div>
    </div>
    <div class="sidebar-footer">
      <div class="user-chip avatar-colors">
        <div class="avatar" id="sidebar-avatar" style="background:var(--c0);color:#fff;font-size:12px"></div>
        <div>
          <div style="font-size:13px;font-weight:500" id="sidebar-name"></div>
          <div style="font-size:11px;color:var(--text2)" id="sidebar-role"></div>
        </div>
        <button class="btn btn-ghost btn-sm btn-icon" onclick="logout()" style="margin-left:auto" title="Sign out">↩</button>
      </div>
    </div>
  </div>

  <div class="main">
    <!-- DASHBOARD -->
    <div id="page-dashboard" style="display:none">
      <div class="topbar">
        <div class="topbar-title">Dashboard</div>
      </div>
      <div class="page">
        <div class="stats-grid" id="stats-grid"></div>
        <div class="dash-grid">
          <div class="dash-card">
            <div class="dash-card-title">Recent tasks</div>
            <div id="dash-recent-tasks"></div>
          </div>
          <div class="dash-card">
            <div class="dash-card-title">Overdue tasks</div>
            <div id="dash-overdue-tasks"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- PROJECTS -->
    <div id="page-projects" style="display:none">
      <div class="topbar">
        <div class="topbar-title">Projects</div>
        <div class="topbar-actions" id="project-actions"></div>
      </div>
      <div class="page">
        <div class="projects-grid" id="projects-grid"></div>
      </div>
    </div>

    <!-- TASKS -->
    <div id="page-tasks" style="display:none">
      <div class="topbar">
        <div class="topbar-title" id="tasks-title">Tasks</div>
        <div class="topbar-actions" id="task-actions"></div>
      </div>
      <div class="page">
        <div class="project-selector" id="project-selector"></div>
        <div class="task-filters" id="task-filters"></div>
        <div class="tasks-list" id="tasks-list"></div>
      </div>
    </div>

    <!-- MEMBERS (Admin only) -->
    <div id="page-members" style="display:none">
      <div class="topbar">
        <div class="topbar-title">Members</div>
        <div class="topbar-actions" id="member-actions"></div>
      </div>
      <div class="page">
        <div class="members-list" id="members-list"></div>
      </div>
    </div>
  </div>
</div>

<!-- MODALS -->
<div id="modal-overlay" class="modal-overlay" style="display:none" onclick="closeModal(event)">
  <div class="modal" id="modal-content"></div>
</div>

<div class="notification" id="notification"></div>

<script>
// ─── DATA STORE ───────────────────────────────────────────────
let db = {
  users: [
    { id: 1, name: 'Alex Rivera', email: 'admin@taskflow.com', password: 'password', role: 'admin' },
    { id: 2, name: 'Sam Chen', email: 'member@taskflow.com', password: 'password', role: 'member' },
    { id: 3, name: 'Maya Patel', email: 'maya@taskflow.com', password: 'password', role: 'member' },
  ],
  projects: [
    { id: 1, name: 'Website Redesign', description: 'Full overhaul of the marketing site with new brand guidelines', createdBy: 1, members: [1,2,3], createdAt: '2026-04-01' },
    { id: 2, name: 'Mobile App v2', description: 'iOS and Android update with new features and performance improvements', createdBy: 1, members: [1,3], createdAt: '2026-04-10' },
    { id: 3, name: 'API Integration', description: 'Connect with third-party payment and analytics services', createdBy: 1, members: [1,2], createdAt: '2026-04-15' },
  ],
  tasks: [
    { id: 1, title: 'Design new homepage mockups', projectId: 1, assigneeId: 2, status: 'done', priority: 'high', dueDate: '2026-04-20', createdBy: 1, description: 'Create Figma mockups for all homepage sections' },
    { id: 2, title: 'Write content for About page', projectId: 1, assigneeId: 3, status: 'in_progress', priority: 'medium', dueDate: '2026-05-05', createdBy: 1, description: 'Draft copy for team bios and company history' },
    { id: 3, title: 'Implement responsive navigation', projectId: 1, assigneeId: 2, status: 'todo', priority: 'high', dueDate: '2026-05-08', createdBy: 1, description: 'Mobile-friendly nav with hamburger menu' },
    { id: 4, title: 'User authentication flow', projectId: 2, assigneeId: 1, status: 'done', priority: 'high', dueDate: '2026-04-25', createdBy: 1, description: 'Login, signup, and password reset' },
    { id: 5, title: 'Push notifications setup', projectId: 2, assigneeId: 3, status: 'in_progress', priority: 'medium', dueDate: '2026-04-28', createdBy: 1, description: 'Firebase integration for push notifications' },
    { id: 6, title: 'Stripe payment integration', projectId: 3, assigneeId: 2, status: 'todo', priority: 'high', dueDate: '2026-04-29', createdBy: 1, description: 'Implement checkout flow with Stripe' },
    { id: 7, title: 'Analytics dashboard setup', projectId: 3, assigneeId: 1, status: 'todo', priority: 'low', dueDate: '2026-05-15', createdBy: 1, description: 'Connect Mixpanel and build event tracking' },
    { id: 8, title: 'App store screenshots', projectId: 2, assigneeId: 3, status: 'todo', priority: 'low', dueDate: '2026-04-27', createdBy: 1, description: 'Design screenshots for App Store listing' },
  ],
  nextUserId: 4,
  nextProjectId: 4,
  nextTaskId: 9,
};

let currentUser = null;
let currentPage = 'dashboard';
let taskFilter = 'all';
let selectedProjectId = null;

// ─── AUTH ──────────────────────────────────────────────────────
function switchTab(tab) {
  document.getElementById('tab-login').classList.toggle('active', tab === 'login');
  document.getElementById('tab-signup').classList.toggle('active', tab === 'signup');
  document.getElementById('login-form').style.display = tab === 'login' ? '' : 'none';
  document.getElementById('signup-form').style.display = tab === 'signup' ? '' : 'none';
}

function login() {
  const email = document.getElementById('login-email').value.trim();
  const pwd = document.getElementById('login-password').value;
  const user = db.users.find(u => u.email === email && u.password === pwd);
  if (!user) { notify('Invalid email or password'); return; }
  currentUser = user;
  initApp();
}

function signup() {
  const name = document.getElementById('signup-name').value.trim();
  const email = document.getElementById('signup-email').value.trim();
  const pwd = document.getElementById('signup-password').value;
  const role = document.getElementById('signup-role').value;
  if (!name || !email || !pwd) { notify('Please fill in all fields'); return; }
  if (pwd.length < 6) { notify('Password must be at least 6 characters'); return; }
  if (db.users.find(u => u.email === email)) { notify('Email already in use'); return; }
  const user = { id: db.nextUserId++, name, email, password: pwd, role };
  db.users.push(user);
  currentUser = user;
  initApp();
}

function logout() {
  currentUser = null;
  document.getElementById('app').classList.remove('visible');
  document.getElementById('auth-screen').style.display = '';
  navigate('dashboard');
}

function initApp() {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app').classList.add('visible');
  const colors = ['var(--c0)','var(--c1)','var(--c2)','var(--c3)','var(--c4)'];
  const aEl = document.getElementById('sidebar-avatar');
  aEl.style.background = colors[currentUser.id % 5];
  aEl.textContent = initials(currentUser.name);
  document.getElementById('sidebar-name').textContent = currentUser.name;
  document.getElementById('sidebar-role').textContent = currentUser.role.charAt(0).toUpperCase() + currentUser.role.slice(1);
  document.getElementById('nav-members').style.display = currentUser.role === 'admin' ? '' : 'none';
  navigate('dashboard');
}

// ─── NAVIGATION ────────────────────────────────────────────────
function navigate(page) {
  currentPage = page;
  ['dashboard','projects','tasks','members'].forEach(p => {
    document.getElementById('page-' + p).style.display = 'none';
  });
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const nav = document.querySelector(`.nav-item[onclick*="${page}"]`);
  if (nav) nav.classList.add('active');
  document.getElementById('page-' + page).style.display = '';
  render(page);
}

function render(page) {
  updateOverdueBadge();
  if (page === 'dashboard') renderDashboard();
  if (page === 'projects') renderProjects();
  if (page === 'tasks') renderTasks();
  if (page === 'members') renderMembers();
}

// ─── DASHBOARD ─────────────────────────────────────────────────
function renderDashboard() {
  const myTasks = getMyTasks();
  const total = myTasks.length;
  const done = myTasks.filter(t => t.status === 'done').length;
  const overdue = myTasks.filter(t => isOverdue(t)).length;
  const inProgress = myTasks.filter(t => t.status === 'in_progress').length;

  document.getElementById('stats-grid').innerHTML = `
    <div class="stat-card"><div class="stat-label">Total tasks</div><div class="stat-value">${total}</div><div class="stat-sub">assigned to you</div></div>
    <div class="stat-card"><div class="stat-label">Completed</div><div class="stat-value" style="color:var(--green)">${done}</div><div class="stat-sub">${total ? Math.round(done/total*100) : 0}% completion</div></div>
    <div class="stat-card"><div class="stat-label">In progress</div><div class="stat-value" style="color:var(--blue)">${inProgress}</div><div class="stat-sub">active tasks</div></div>
    <div class="stat-card"><div class="stat-label">Overdue</div><div class="stat-value" style="color:${overdue>0?'var(--red)':'var(--text)'}">${overdue}</div><div class="stat-sub">past due date</div></div>
  `;

  const recent = [...db.tasks].sort((a,b)=>b.id-a.id).slice(0,5);
  document.getElementById('dash-recent-tasks').innerHTML = recent.length ? recent.map(t => `
    <div class="mini-task">
      <span class="badge badge-${statusClass(t.status)}">${statusLabel(t.status)}</span>
      <span style="flex:1">${t.title}</span>
    </div>`).join('') : '<div style="color:var(--text2);font-size:13px">No tasks yet</div>';

  const od = db.tasks.filter(t => isOverdue(t));
  document.getElementById('dash-overdue-tasks').innerHTML = od.length ? od.map(t => `
    <div class="mini-task">
      <span style="color:var(--red);font-size:11px">▲</span>
      <span style="flex:1">${t.title}</span>
      <span style="font-size:11px;color:var(--text2)">${t.dueDate}</span>
    </div>`).join('') : '<div style="color:var(--green);font-size:13px">🎉 No overdue tasks!</div>';
}

// ─── PROJECTS ──────────────────────────────────────────────────
function renderProjects() {
  const isAdmin = currentUser.role === 'admin';
  document.getElementById('project-actions').innerHTML = isAdmin
    ? `<button class="btn btn-primary btn-sm" onclick="openModal('create-project')">+ New project</button>` : '';

  const projects = isAdmin ? db.projects : db.projects.filter(p => p.members.includes(currentUser.id));
  const grid = document.getElementById('projects-grid');
  if (!projects.length) {
    grid.innerHTML = `<div class="empty"><div class="empty-icon">⬡</div><div class="empty-text">No projects yet</div></div>`;
    return;
  }
  grid.innerHTML = projects.map(p => {
    const tasks = db.tasks.filter(t => t.projectId === p.id);
    const done = tasks.filter(t => t.status === 'done').length;
    const pct = tasks.length ? Math.round(done/tasks.length*100) : 0;
    const members = p.members.map(id => db.users.find(u => u.id === id)).filter(Boolean);
    return `
    <div class="project-card" onclick="openProjectTasks(${p.id})">
      <div class="project-name">${p.name}</div>
      <div class="project-desc">${p.description}</div>
      <div class="project-meta">
        <div style="display:flex;gap:4px">${members.slice(0,4).map((m,i)=>`<div class="avatar avatar-colors" style="width:24px;height:24px;font-size:10px;background:var(--c${i%5});color:#fff">${initials(m.name)}</div>`).join('')}</div>
        <span style="font-size:12px;color:var(--text2)">${tasks.length} task${tasks.length!==1?'s':''}</span>
      </div>
      <div class="progress-wrap">
        <div class="progress-label"><span>Progress</span><span>${pct}%</span></div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      </div>
      ${isAdmin ? `<div style="margin-top:14px;display:flex;gap:8px">
        <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();openModal('edit-project',${p.id})">Edit</button>
        <button class="btn btn-danger btn-sm" onclick="event.stopPropagation();deleteProject(${p.id})">Delete</button>
      </div>` : ''}
    </div>`;
  }).join('');
}

function openProjectTasks(projectId) {
  selectedProjectId = projectId;
  navigate('tasks');
}

// ─── TASKS ─────────────────────────────────────────────────────
function renderTasks() {
  const isAdmin = currentUser.role === 'admin';
  document.getElementById('task-actions').innerHTML = isAdmin
    ? `<button class="btn btn-primary btn-sm" onclick="openModal('create-task')">+ New task</button>` : '';

  // Project selector
  const projects = isAdmin ? db.projects : db.projects.filter(p => p.members.includes(currentUser.id));
  const sel = document.getElementById('project-selector');
  sel.innerHTML = `<div class="proj-chip ${selectedProjectId === null ? 'active':''}" onclick="selectedProjectId=null;renderTasks()">All projects</div>` +
    projects.map(p => `<div class="proj-chip ${selectedProjectId===p.id?'active':''}" onclick="selectedProjectId=${p.id};renderTasks()">${p.name}</div>`).join('');

  // Filters
  const filters = [
    {id:'all',label:'All'},
    {id:'todo',label:'To do'},
    {id:'in_progress',label:'In progress'},
    {id:'done',label:'Done'},
    {id:'overdue',label:'Overdue'},
    {id:'mine',label:'Assigned to me'},
  ];
  document.getElementById('task-filters').innerHTML = filters.map(f =>
    `<div class="filter-chip ${taskFilter===f.id?'active':''}" onclick="taskFilter='${f.id}';renderTasks()">${f.label}</div>`
  ).join('');

  let tasks = db.tasks;
  if (selectedProjectId !== null) tasks = tasks.filter(t => t.projectId === selectedProjectId);
  if (!isAdmin) tasks = tasks.filter(t => {
    const proj = db.projects.find(p => p.id === t.projectId);
    return proj && proj.members.includes(currentUser.id);
  });

  if (taskFilter === 'todo') tasks = tasks.filter(t => t.status === 'todo');
  else if (taskFilter === 'in_progress') tasks = tasks.filter(t => t.status === 'in_progress');
  else if (taskFilter === 'done') tasks = tasks.filter(t => t.status === 'done');
  else if (taskFilter === 'overdue') tasks = tasks.filter(t => isOverdue(t));
  else if (taskFilter === 'mine') tasks = tasks.filter(t => t.assigneeId === currentUser.id);

  const title = selectedProjectId ? db.projects.find(p=>p.id===selectedProjectId)?.name : 'All Tasks';
  document.getElementById('tasks-title').textContent = title;

  const list = document.getElementById('tasks-list');
  if (!tasks.length) {
    list.innerHTML = `<div class="empty"><div class="empty-icon">◉</div><div class="empty-text">No tasks here</div></div>`;
    return;
  }

  list.innerHTML = tasks.map(t => {
    const assignee = db.users.find(u => u.id === t.assigneeId);
    const proj = db.projects.find(p => p.id === t.projectId);
    const od = isOverdue(t);
    return `
    <div class="task-row">
      <div class="task-check ${t.status==='done'?'done':''}" onclick="toggleTask(${t.id})"></div>
      <div style="flex:1">
        <div class="task-title ${t.status==='done'?'done':''}">${t.title}</div>
        <div style="margin-top:4px;display:flex;align-items:center;gap:8px;flex-wrap:wrap">
          ${proj ? `<span style="font-size:11px;color:var(--text2)">${proj.name}</span>` : ''}
          ${od ? `<span class="overdue-warning">▲ Overdue</span>` : `<span style="font-size:11px;color:var(--text2)">${t.dueDate}</span>`}
        </div>
      </div>
      <div class="task-info">
        <span class="badge badge-${t.priority==='high'?'high':t.priority==='medium'?'medium':'low'}">${t.priority}</span>
        <span class="badge badge-${statusClass(t.status)}">${statusLabel(t.status)}</span>
        ${assignee ? `<div class="avatar avatar-colors" style="width:26px;height:26px;font-size:10px;background:var(--c${assignee.id%5});color:#fff">${initials(assignee.name)}</div>` : ''}
        <div class="task-actions">
          ${isAdmin ? `<button class="btn btn-ghost btn-sm btn-icon" onclick="openModal('edit-task',${t.id})" title="Edit">✎</button>
          <button class="btn btn-danger btn-sm btn-icon" onclick="deleteTask(${t.id})" title="Delete">✕</button>` : ''}
        </div>
      </div>
    </div>`;
  }).join('');
}

function toggleTask(id) {
  const task = db.tasks.find(t => t.id === id);
  if (!task) return;
  if (task.status === 'done') task.status = 'todo';
  else task.status = 'done';
  renderTasks();
  notify(task.status === 'done' ? 'Task marked as done!' : 'Task reopened');
}

function deleteTask(id) {
  if (!confirm('Delete this task?')) return;
  db.tasks = db.tasks.filter(t => t.id !== id);
  renderTasks();
  notify('Task deleted');
}

function deleteProject(id) {
  if (!confirm('Delete this project and all its tasks?')) return;
  db.projects = db.projects.filter(p => p.id !== id);
  db.tasks = db.tasks.filter(t => t.projectId !== id);
  renderProjects();
  notify('Project deleted');
}

// ─── MEMBERS ───────────────────────────────────────────────────
function renderMembers() {
  const actions = document.getElementById('member-actions');
  actions.innerHTML = `<button class="btn btn-primary btn-sm" onclick="openModal('invite-member')">+ Invite member</button>`;

  const list = document.getElementById('members-list');
  list.innerHTML = db.users.map(u => `
    <div class="member-row">
      <div class="avatar avatar-colors" style="background:var(--c${u.id%5});color:#fff;width:38px;height:38px;font-size:14px">${initials(u.name)}</div>
      <div class="member-info">
        <div class="member-name">${u.name}</div>
        <div class="member-email">${u.email}</div>
      </div>
      <span class="role-tag role-${u.role}">${u.role}</span>
      ${u.id !== currentUser.id ? `
        <button class="btn btn-ghost btn-sm" onclick="toggleRole(${u.id})">${u.role==='admin'?'Make member':'Make admin'}</button>
        <button class="btn btn-danger btn-sm" onclick="removeMember(${u.id})">Remove</button>
      ` : '<span style="font-size:12px;color:var(--text2)">You</span>'}
    </div>`).join('');
}

function toggleRole(id) {
  const user = db.users.find(u => u.id === id);
  if (!user) return;
  user.role = user.role === 'admin' ? 'member' : 'admin';
  renderMembers();
  notify('Role updated');
}

function removeMember(id) {
  if (!confirm('Remove this member?')) return;
  db.users = db.users.filter(u => u.id !== id);
  db.projects.forEach(p => { p.members = p.members.filter(m => m !== id); });
  renderMembers();
  notify('Member removed');
}

// ─── MODALS ────────────────────────────────────────────────────
function openModal(type, id) {
  const overlay = document.getElementById('modal-overlay');
  const content = document.getElementById('modal-content');
  overlay.style.display = 'flex';

  if (type === 'create-project') {
    content.innerHTML = `
      <div class="modal-title">New project</div>
      <div class="form-group"><label>Project name</label><input type="text" id="m-pname" placeholder="e.g. Website Redesign"></div>
      <div class="form-group"><label>Description</label><textarea id="m-pdesc" placeholder="What is this project about?"></textarea></div>
      <div class="form-group"><label>Team members</label>
        <div style="display:flex;flex-direction:column;gap:6px;max-height:140px;overflow-y:auto">
          ${db.users.map(u=>`<label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;color:var(--text)">
            <input type="checkbox" value="${u.id}" ${u.id===currentUser.id?'checked disabled':''} id="pm-${u.id}"> ${u.name} <span style="color:var(--text2);font-size:11px">${u.email}</span>
          </label>`).join('')}
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" style="width:auto" onclick="createProject()">Create project</button>
      </div>`;
  }

  if (type === 'edit-project') {
    const p = db.projects.find(x => x.id === id);
    content.innerHTML = `
      <div class="modal-title">Edit project</div>
      <input type="hidden" id="m-pid" value="${p.id}">
      <div class="form-group"><label>Project name</label><input type="text" id="m-pname" value="${p.name}"></div>
      <div class="form-group"><label>Description</label><textarea id="m-pdesc">${p.description}</textarea></div>
      <div class="form-group"><label>Team members</label>
        <div style="display:flex;flex-direction:column;gap:6px;max-height:140px;overflow-y:auto">
          ${db.users.map(u=>`<label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;color:var(--text)">
            <input type="checkbox" value="${u.id}" ${p.members.includes(u.id)?'checked':''} ${u.id===currentUser.id?'disabled':''} id="pm-${u.id}"> ${u.name}
          </label>`).join('')}
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" style="width:auto" onclick="updateProject()">Save changes</button>
      </div>`;
  }

  if (type === 'create-task') {
    const projects = db.projects;
    content.innerHTML = `
      <div class="modal-title">New task</div>
      <div class="form-group"><label>Title</label><input type="text" id="m-ttitle" placeholder="What needs to be done?"></div>
      <div class="form-group"><label>Description</label><textarea id="m-tdesc" placeholder="Optional details..."></textarea></div>
      <div class="two-col">
        <div class="form-group"><label>Project</label><select id="m-tproject">
          ${projects.map(p=>`<option value="${p.id}" ${selectedProjectId===p.id?'selected':''}>${p.name}</option>`).join('')}
        </select></div>
        <div class="form-group"><label>Assignee</label><select id="m-tassignee">
          ${db.users.map(u=>`<option value="${u.id}">${u.name}</option>`).join('')}
        </select></div>
      </div>
      <div class="two-col">
        <div class="form-group"><label>Priority</label><select id="m-tpriority">
          <option value="low">Low</option><option value="medium" selected>Medium</option><option value="high">High</option>
        </select></div>
        <div class="form-group"><label>Due date</label><input type="date" id="m-tdue" value="${new Date().toISOString().slice(0,10)}"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" style="width:auto" onclick="createTask()">Create task</button>
      </div>`;
  }

  if (type === 'edit-task') {
    const t = db.tasks.find(x => x.id === id);
    content.innerHTML = `
      <div class="modal-title">Edit task</div>
      <input type="hidden" id="m-tid" value="${t.id}">
      <div class="form-group"><label>Title</label><input type="text" id="m-ttitle" value="${t.title}"></div>
      <div class="form-group"><label>Description</label><textarea id="m-tdesc">${t.description||''}</textarea></div>
      <div class="two-col">
        <div class="form-group"><label>Status</label><select id="m-tstatus">
          <option value="todo" ${t.status==='todo'?'selected':''}>To do</option>
          <option value="in_progress" ${t.status==='in_progress'?'selected':''}>In progress</option>
          <option value="done" ${t.status==='done'?'selected':''}>Done</option>
        </select></div>
        <div class="form-group"><label>Priority</label><select id="m-tpriority">
          <option value="low" ${t.priority==='low'?'selected':''}>Low</option>
          <option value="medium" ${t.priority==='medium'?'selected':''}>Medium</option>
          <option value="high" ${t.priority==='high'?'selected':''}>High</option>
        </select></div>
      </div>
      <div class="two-col">
        <div class="form-group"><label>Assignee</label><select id="m-tassignee">
          ${db.users.map(u=>`<option value="${u.id}" ${t.assigneeId===u.id?'selected':''}>${u.name}</option>`).join('')}
        </select></div>
        <div class="form-group"><label>Due date</label><input type="date" id="m-tdue" value="${t.dueDate}"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" style="width:auto" onclick="updateTask()">Save changes</button>
      </div>`;
  }

  if (type === 'invite-member') {
    content.innerHTML = `
      <div class="modal-title">Invite member</div>
      <div class="form-group"><label>Full name</label><input type="text" id="m-iname" placeholder="Jane Smith"></div>
      <div class="form-group"><label>Email</label><input type="email" id="m-iemail" placeholder="jane@company.com"></div>
      <div class="form-group"><label>Role</label><select id="m-irole">
        <option value="member">Member</option>
        <option value="admin">Admin</option>
      </select></div>
      <div class="form-group"><label>Temporary password</label><input type="password" id="m-ipassword" placeholder="Set initial password"></div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" style="width:auto" onclick="inviteMember()">Send invite</button>
      </div>`;
  }
}

function closeModal(event) {
  if (event && event.target !== document.getElementById('modal-overlay')) return;
  document.getElementById('modal-overlay').style.display = 'none';
}

function createProject() {
  const name = document.getElementById('m-pname').value.trim();
  const desc = document.getElementById('m-pdesc').value.trim();
  if (!name) { notify('Project name is required'); return; }
  const members = [currentUser.id, ...db.users.filter(u => {
    const cb = document.getElementById('pm-' + u.id);
    return cb && cb.checked && u.id !== currentUser.id;
  }).map(u => u.id)];
  db.projects.push({ id: db.nextProjectId++, name, description: desc, createdBy: currentUser.id, members, createdAt: new Date().toISOString().slice(0,10) });
  closeModal();
  renderProjects();
  notify('Project created!');
}

function updateProject() {
  const id = parseInt(document.getElementById('m-pid').value);
  const p = db.projects.find(x => x.id === id);
  p.name = document.getElementById('m-pname').value.trim();
  p.description = document.getElementById('m-pdesc').value.trim();
  p.members = [currentUser.id, ...db.users.filter(u => {
    const cb = document.getElementById('pm-' + u.id);
    return cb && cb.checked;
  }).map(u => u.id).filter(uid => uid !== currentUser.id)];
  document.getElementById('modal-overlay').style.display = 'none';
  renderProjects();
  notify('Project updated!');
}

function createTask() {
  const title = document.getElementById('m-ttitle').value.trim();
  if (!title) { notify('Task title is required'); return; }
  db.tasks.push({
    id: db.nextTaskId++, title,
    description: document.getElementById('m-tdesc').value.trim(),
    projectId: parseInt(document.getElementById('m-tproject').value),
    assigneeId: parseInt(document.getElementById('m-tassignee').value),
    status: 'todo',
    priority: document.getElementById('m-tpriority').value,
    dueDate: document.getElementById('m-tdue').value,
    createdBy: currentUser.id,
  });
  document.getElementById('modal-overlay').style.display = 'none';
  renderTasks();
  notify('Task created!');
}

function updateTask() {
  const id = parseInt(document.getElementById('m-tid').value);
  const t = db.tasks.find(x => x.id === id);
  t.title = document.getElementById('m-ttitle').value.trim();
  t.description = document.getElementById('m-tdesc').value.trim();
  t.status = document.getElementById('m-tstatus').value;
  t.priority = document.getElementById('m-tpriority').value;
  t.assigneeId = parseInt(document.getElementById('m-tassignee').value);
  t.dueDate = document.getElementById('m-tdue').value;
  document.getElementById('modal-overlay').style.display = 'none';
  renderTasks();
  notify('Task updated!');
}

function inviteMember() {
  const name = document.getElementById('m-iname').value.trim();
  const email = document.getElementById('m-iemail').value.trim();
  const role = document.getElementById('m-irole').value;
  const pwd = document.getElementById('m-ipassword').value;
  if (!name || !email || !pwd) { notify('Please fill in all fields'); return; }
  if (db.users.find(u => u.email === email)) { notify('Email already in use'); return; }
  db.users.push({ id: db.nextUserId++, name, email, password: pwd, role });
  document.getElementById('modal-overlay').style.display = 'none';
  renderMembers();
  notify('Member invited!');
}

// ─── HELPERS ───────────────────────────────────────────────────
function initials(name) {
  return name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
}

function isOverdue(task) {
  if (task.status === 'done') return false;
  return new Date(task.dueDate) < new Date(new Date().toDateString());
}

function getMyTasks() {
  return db.tasks.filter(t => t.assigneeId === currentUser.id);
}

function statusClass(s) {
  if (s === 'done') return 'done';
  if (s === 'in_progress') return 'progress';
  return 'todo';
}

function statusLabel(s) {
  if (s === 'done') return 'Done';
  if (s === 'in_progress') return 'In progress';
  return 'To do';
}

function updateOverdueBadge() {
  const badge = document.getElementById('overdue-badge');
  const od = db.tasks.filter(t => isOverdue(t)).length;
  badge.style.display = od > 0 ? '' : 'none';
  badge.textContent = od;
}

function notify(msg) {
  const el = document.getElementById('notification');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}
</script>
